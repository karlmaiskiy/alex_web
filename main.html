<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Икс Пятница — запись в магазины X5</title>
  <link rel="preconnect" href="https://unpkg.com" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root {
      --bg: #0e1117;
      --panel: #161b23;
      --accent: #ff4d4f;
      --text: #e6edf3;
      --muted: #9ca5b1;
      --border: #222b38;
      --green: #34c759;
      --orange: #ffb020;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at 20% 20%, #1a2231, #0c1017 50%);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      padding: 28px 24px 12px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .logo {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: linear-gradient(135deg, #ff4d4f, #ff7a45);
      display: grid;
      place-items: center;
      font-weight: 800;
      font-size: 26px;
      color: #fff;
      box-shadow: 0 12px 30px rgba(255, 77, 79, 0.28);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 4px;
      font-size: 15px;
    }

    main {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 16px;
      padding: 0 24px 24px 24px;
    }

    @media (max-width: 1024px) {
      main {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    #map { height: 520px; min-height: 420px; }

    .panel__header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .panel__title { font-weight: 700; font-size: 17px; }
    .chip {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 13px;
      color: var(--muted);
    }

    .form {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #0f141c;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(255, 77, 79, 0.15);
    }

    button {
      border: none;
      padding: 13px 18px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button.primary {
      background: linear-gradient(135deg, #ff4d4f, #ff7a45);
      color: #fff;
      box-shadow: 0 10px 22px rgba(255, 77, 79, 0.35);
    }

    button.secondary {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button:not(:disabled):active { transform: translateY(1px); }

    .store-info {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      padding: 12px 14px;
      border-radius: 12px;
      line-height: 1.6;
    }

    .availability {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(52, 199, 89, 0.08);
      color: var(--green);
      border: 1px solid rgba(52, 199, 89, 0.25);
      font-weight: 600;
    }

    .availability.full {
      background: rgba(255, 77, 79, 0.08);
      color: #ff6b6d;
      border-color: rgba(255, 77, 79, 0.3);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 12px 18px 20px 18px;
      color: var(--muted);
      font-size: 13px;
      align-items: center;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }

    .toast {
      position: fixed;
      top: 16px;
      right: 16px;
      background: #11161f;
      border: 1px solid var(--border);
      padding: 14px 18px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      display: none;
      z-index: 9999;
    }

    .slots-counter { color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">X5</div>
    <div>
      <h1>Икс Пятница — запись на экскурсии</h1>
      <div class="subtitle">Пятёрочка · Перекрёсток · Чижик · Москва · до 3 человек на дату</div>
    </div>
  </header>

  <main>
    <section class="panel">
      <div class="panel__header">
        <div class="panel__title">Магазины на карте</div>
        <div class="chip" id="visible-counter">Всего магазинов: 0</div>
      </div>
      <div id="map"></div>
      <div class="legend">
        <span><span class="dot" style="background:#ff4d4f"></span>Пятёрочка</span>
        <span><span class="dot" style="background:#5bc0de"></span>Перекрёсток</span>
        <span><span class="dot" style="background:#ffd166"></span>Чижик</span>
        <span><span class="dot" style="background:#9ca5b1"></span>Недоступно</span>
      </div>
    </section>

    <section class="panel">
      <div class="panel__header">
        <div class="panel__title">Бронирование визита</div>
        <div class="chip" id="selected-store-chip">Магазин не выбран</div>
      </div>
      <form class="form" id="booking-form">
        <div>
          <label for="visit-date">Выберите дату</label>
          <input type="date" id="visit-date" required />
        </div>
        <div>
          <label>Выбранный магазин</label>
          <div class="store-info" id="store-info">Кликните на маркер на карте.</div>
        </div>
        <div class="slots-counter" id="slots-info"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <div>
            <label for="full-name">ФИО</label>
            <input id="full-name" type="text" placeholder="Иванов Иван" required />
          </div>
          <div>
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="you@office.ru" required />
          </div>
        </div>
        <button type="submit" class="primary" id="submit-btn" disabled>Записаться</button>
        <button type="button" class="secondary" id="export-btn">Выгрузить базу (CSV)</button>
      </form>
    </section>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const stores = [
      { id: 'p-1', brand: 'Пятёрочка', name: 'Пятёрочка — Тверская', address: 'ул. Тверская, 6', coords: [55.757695, 37.613708] },
      { id: 'p-2', brand: 'Пятёрочка', name: 'Пятёрочка — Краснопресненская', address: 'ул. Красная Пресня, 21', coords: [55.760671, 37.567214] },
      { id: 'p-3', brand: 'Пятёрочка', name: 'Пятёрочка — Замоскворечье', address: 'ул. Бахрушина, 24', coords: [55.738969, 37.635788] },
      { id: 'x-1', brand: 'Перекрёсток', name: 'Перекрёсток — Белорусская', address: 'ул. Лесная, 5Б', coords: [55.775912, 37.584598] },
      { id: 'x-2', brand: 'Перекрёсток', name: 'Перекрёсток — Марьина Роща', address: 'ул. Сущёвский Вал, 62', coords: [55.794053, 37.617884] },
      { id: 'x-3', brand: 'Перекрёсток', name: 'Перекрёсток — Парк Победы', address: 'Кутузовский просп., 48', coords: [55.742801, 37.521149] },
      { id: 'c-1', brand: 'Чижик', name: 'Чижик — Перово', address: 'ул. Перовская, 66', coords: [55.750436, 37.79258] },
      { id: 'c-2', brand: 'Чижик', name: 'Чижик — Щукино', address: 'ул. Маршала Бирюзова, 31', coords: [55.800336, 37.48663] },
      { id: 'c-3', brand: 'Чижик', name: 'Чижик — Тёплый Стан', address: 'ул. Тёплый Стан, 9к3', coords: [55.621834, 37.504312] },
      { id: 'p-4', brand: 'Пятёрочка', name: 'Пятёрочка — ВДНХ', address: 'просп. Мира, 119с205', coords: [55.829863, 37.636079] },
      { id: 'x-4', brand: 'Перекрёсток', name: 'Перекрёсток — Шаболовка', address: 'ул. Шаболовка, 30', coords: [55.718762, 37.609321] }
    ];

    const brandColor = brand => ({
      'Пятёрочка': '#ff4d4f',
      'Перекрёсток': '#5bc0de',
      'Чижик': '#ffd166'
    }[brand] || '#9ca5b1');

    const storageKey = 'ix_friday_bookings_v1';
    let bookings = JSON.parse(localStorage.getItem(storageKey) || '[]');
    let selectedStore = null;
    const map = L.map('map', { zoomControl: false }).setView([55.751244, 37.618423], 11.3);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '© OpenStreetMap'
    }).addTo(map);
    L.control.zoom({ position: 'bottomright' }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);

    const chip = document.getElementById('selected-store-chip');
    const storeInfo = document.getElementById('store-info');
    const slotsInfo = document.getElementById('slots-info');
    const dateInput = document.getElementById('visit-date');
    const toast = document.getElementById('toast');
    const submitBtn = document.getElementById('submit-btn');
    const exportBtn = document.getElementById('export-btn');
    const visibleCounter = document.getElementById('visible-counter');

    dateInput.min = new Date().toISOString().split('T')[0];

    function saveBookings() {
      localStorage.setItem(storageKey, JSON.stringify(bookings));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3200);
    }

    function bookingCount(storeId, date) {
      return bookings.filter(b => b.storeId === storeId && b.date === date).length;
    }

    function slotsFor(storeId, date) {
      const taken = bookingCount(storeId, date);
      const remaining = Math.max(0, 3 - taken);
      return { taken, remaining, full: remaining === 0 };
    }

    function formatSlots(storeId, date) {
      const { taken, remaining, full } = slotsFor(storeId, date);
      slotsInfo.innerHTML = date && storeId ? `
        <span class="availability ${full ? 'full' : ''}">
          ${full ? 'Мест нет' : 'Доступно мест: ' + remaining} · занято ${taken}/3
        </span>
      ` : '';
      submitBtn.disabled = full || !storeId || !date;
      return { taken, remaining, full };
    }

    function renderMarkers() {
      markerLayer.clearLayers();
      const date = dateInput.value;
      let visible = 0;
      stores.forEach(store => {
        const { full } = date ? slotsFor(store.id, date) : { full: false };
        const color = full ? '#9ca5b1' : brandColor(store.brand);
        const marker = L.circleMarker(store.coords, {
          radius: 9,
          color,
          weight: 2,
          fillColor: color,
          fillOpacity: 0.9
        });
        const availableText = date ? (full ? 'Недоступно' : 'Доступно') : 'Выберите дату';
        marker.bindPopup(`<strong>${store.name}</strong><br>${store.address}<br><small>${availableText}</small>`);
        marker.on('click', () => selectStore(store));
        if (!date || !full) visible++;
        markerLayer.addLayer(marker);
      });
      visibleCounter.textContent = `Показываем: ${visible} / ${stores.length}`;
    }

    function selectStore(store) {
      selectedStore = store;
      chip.textContent = store.name;
      chip.style.color = brandColor(store.brand);
      storeInfo.innerHTML = `<strong>${store.name}</strong><br>${store.address}<br>${store.brand}`;
      if (dateInput.value) formatSlots(store.id, dateInput.value);
      submitBtn.disabled = !dateInput.value;
      map.setView(store.coords, 13);
    }

    function exportCSV() {
      if (!bookings.length) {
        showToast('Нет записей для выгрузки');
        return;
      }
      const header = ['storeId','brand','storeName','address','date','fullName','email','timestamp'];
      const rows = bookings.map(b => header.map(key => `"${(b[key] || '').replace(/"/g, '""')}"`).join(','));
      const csv = [header.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'ix-friday-bookings.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    document.getElementById('booking-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const date = dateInput.value;
      if (!selectedStore || !date) return;
      const { full } = formatSlots(selectedStore.id, date);
      if (full) {
        showToast('На эту дату уже нет мест');
        renderMarkers();
        return;
      }
      const entry = {
        storeId: selectedStore.id,
        brand: selectedStore.brand,
        storeName: selectedStore.name,
        address: selectedStore.address,
        date,
        fullName: document.getElementById('full-name').value.trim(),
        email: document.getElementById('email').value.trim(),
        timestamp: new Date().toISOString()
      };
      bookings.push(entry);
      saveBookings();
      showToast('Вы записаны! Подтверждение сохранено.');
      renderMarkers();
      formatSlots(selectedStore.id, date);
    });

    dateInput.addEventListener('change', () => {
      if (selectedStore) formatSlots(selectedStore.id, dateInput.value);
      submitBtn.disabled = !dateInput.value || !selectedStore;
      renderMarkers();
    });

    exportBtn.addEventListener('click', exportCSV);

    renderMarkers();
  </script>
</body>
</html>
